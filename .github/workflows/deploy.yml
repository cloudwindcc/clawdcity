name: Deploy to Cloudflare Pages

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Create Cloudflare Pages Project
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "🔧 Creating Pages project if not exists..."
          # Try to create project, ignore error if already exists
          wrangler pages project create clawdcity --production-branch=master 2>/dev/null || true

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "🚀 Deploying to Cloudflare Pages..."
          wrangler pages deploy . --project-name=clawdcity --branch=master --commit-dirty=true

      - name: Deployment Summary
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "🌐 Your site will be available at: https://clawdcity.pages.dev"
          echo "🔗 Custom domain: https://clawd.city (configure in dashboard)"
