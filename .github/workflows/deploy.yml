name: Deploy to Cloudflare Pages

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "❌ Error: CLOUDFLARE_API_TOKEN is not set"
            echo "Please add CLOUDFLARE_API_TOKEN to your repository secrets"
            echo "Visit: https://github.com/cloudwindcc/clawdcity/settings/secrets/actions"
            exit 1
          fi
          
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "❌ Error: CLOUDFLARE_ACCOUNT_ID is not set"
            echo "Please add CLOUDFLARE_ACCOUNT_ID to your repository secrets"
            echo "Find it at: https://dash.cloudflare.com (right sidebar)"
            exit 1
          fi
          
          echo "🚀 Deploying to Cloudflare Pages..."
          wrangler pages deploy . --project-name=clawdcity --branch=main

      - name: Deployment Summary
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "🌐 Your site will be available at: https://clawdcity.pages.dev"
